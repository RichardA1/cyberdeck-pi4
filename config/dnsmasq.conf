# CyberDeck — dnsmasq configuration (isolated mode)
# Serves DHCP on wlan0 and hijacks all DNS to the Pi

interface=wlan0
bind-interfaces

# DHCP range
dhcp-range=192.168.4.2,192.168.4.20,255.255.255.0,24h

# Resolve ALL domains to the Pi (captive portal)
address=/#/192.168.4.1

# Don't read /etc/resolv.conf (no upstream DNS in isolated mode)
no-resolv

# Log DHCP leases (used by collect-status.sh)
dhcp-leasefile=/var/lib/misc/dnsmasq.leases
