# CyberDeck — hostapd configuration (Pi 4, 2.4 GHz)
# Change the passphrase before any real deployment!

interface=wlan0
driver=nl80211

ssid=CyberDeck
wpa_passphrase=ChangeMe123!

# 2.4 GHz for maximum client compatibility
# See docs/MANUAL_SETUP.md for 5 GHz instructions
hw_mode=g
channel=7

# 802.11n support (HT)
ieee80211n=1
wmm_enabled=1

# WPA2 only
wpa=2
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP
