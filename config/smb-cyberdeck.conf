# CyberDeck — Samba share configuration
# Included from /etc/samba/smb.conf via:
#   include = /etc/samba/smb-cyberdeck.conf

[webfiles]
   comment = CyberDeck web files
   path = /var/www/html
   browseable = yes
   read only = no
   valid users = pi
   force group = webedit
   create mask = 0664
   directory mask = 2775
   force create mode = 0664
   force directory mode = 2775

